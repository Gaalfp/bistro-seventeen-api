spring:
  application:
    name: bistro.seventeen
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS app;
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: app
        format_sql: true
    show-sql: false