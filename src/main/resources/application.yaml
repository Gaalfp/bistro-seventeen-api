spring:
  application:
    name: bistro.seventeen
  datasource:
    # Em container, defina SPRING_DATASOURCE_URL (ex.: jdbc:postgresql://postgres:5432/tech_challenge).
    # Localmente, o padrão continua sendo localhost.
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tech_challenge}"
    username: "${SPRING_DATASOURCE_USERNAME:fiap_user}"
    password: "${SPRING_DATASOURCE_PASSWORD:123456}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS app;
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
        format_sql: true
        jdbc.time_zone: UTC
    show-sql: false