services:
  postgres:
    image: postgres:16
    container_name: techchallenge-postgres 
    restart: unless-stopped
    environment:
      POSTGRES_DB: tech_challenge
      POSTGRES_USER: fiap_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: techchallenge-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
      DB_URL: jdbc:postgresql://postgres:5432/tech_challenge
      DB_USERNAME: fiap_user
      DB_PASSWORD: 123456
    restart: unless-stopped

volumes:
  postgres_data: