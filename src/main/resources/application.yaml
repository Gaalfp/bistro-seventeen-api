spring:
  application:
    name: bistro.seventeen
  datasource:
    url: jdbc:postgresql://localhost:5432/tech_challenge
    username: fiap_user
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS app;
  jpa:
